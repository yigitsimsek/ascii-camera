name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Swift tools 6.0 is required by Package.swift. The macOS 14 image still
    # defaults to Swift 5.10, while macos-15 ships a Swift 6 toolchain.
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Test renderer, host, and OBS bridge
        run: scripts/test.sh
